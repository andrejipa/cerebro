# Ground-truth dataset for the `INSUFFICIENT_EXPORT_SURFACE` tripwire.
#
# Each case supplies:
# - `text`: a source artifact that may declare required export anchors
# - `exports_text`: captured export outputs already produced elsewhere
#
# The rule is intentionally conservative: it only triggers when the
# source artifact explicitly declares a `## Required Export Anchors`
# section with at least two bullet items, and none of them appear in
# the captured exports.

schema_version = "1"

[[case]]
id = "pos-exp-001"
label = "positive"
label_reason = "two required anchors declared; neither appears anywhere in captured exports"
expected_confidence = "medium"
text = """
# Need Artifact

## Required Export Anchors

- current approved entrypoint
- next operational step
"""
exports_text = """
# status-export

- authority: derived-read-only
- current mode: frozen
- latest suite result: 730 tests
"""

[[case]]
id = "pos-exp-002"
label = "positive"
label_reason = "three required anchors declared; no export carries any of them"
expected_confidence = "high"
text = """
