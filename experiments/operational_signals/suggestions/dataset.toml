# Ground-truth dataset for the `STALE_INFORMATION` tripwire over
# `SYSTEM_STATE.md`-shaped text.
#
# This dataset is derived, non-authoritative, and exists solely to
# measure precision/recall of `detect_stale_system_state`. It must not
# be treated as canonical state. Every case carries a human-authored
# label and an explicit reason.
#
# Label vocabulary:
#   - positive: the rule should emit a suggestion
#   - negative: the rule must stay silent
#
# The dataset intentionally includes borderline and adversarial cases
# to expose over-triggering and under-triggering.

