# Experiments Lifecycle Ledger
#
# This ledger is a derived governance artifact listing every folder
# under `experiments/` that counts as an experiment, together with its
# lifecycle status and review cadence.
#
# It is NOT canonical runtime state. It must not be read or written by
# `core/` or by any runtime mutator, and it must never be treated as a
# second source of truth.
#
# Vocabulary for `status`:
#
#   - active     — currently in use; must carry `last_reviewed`,
#                  `next_review_due`, and `outcome_so_far`
#   - graduated  — promoted into an approved surface; must carry
#                  `graduated_on`, `graduated_to`, and `outcome_so_far`
#   - archived   — complete, kept as historical evidence, not in use;
#                  must carry `archived_on` and `outcome_so_far`
#
# Deletion of an archived experiment requires an explicit ADR.

schema_version = "1"
default_review_interval_days = 90

