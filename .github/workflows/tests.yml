name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  base:
    name: base gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python -m pip install -e . --no-deps

      - run: python -m tests.gate_runner --profile base

  mcp:
    name: optional MCP gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python -m pip install -e ".[mcp]"

      - run: python -m tests.gate_runner --profile mcp
